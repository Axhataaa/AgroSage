<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — AgroSage</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>

<div class="auth-page">

  <!-- Minimal nav -->
  <nav class="auth-nav">
    <!-- FIX: Was href="index.html" → use Flask route '/' -->
    <a class="auth-nav-logo" href="/">
      <div class="auth-nav-logo-icon">🌾</div>
      Agro<span>Sage</span>
    </a>
    <!-- FIX: Was href="index.html" → use Flask route '/' -->
    <a class="auth-nav-back" href="/">← Back to home</a>
  </nav>

  <!-- Centered card -->
  <div class="auth-center">
    <div class="auth-card">

      <div class="auth-card-eyebrow">🌱 Get Started Free</div>
      <h1 class="auth-card-title">Create your account</h1>
      <p class="auth-card-sub">Join AgroSage to get personalised crop recommendations, disease alerts and field analysis — all in one place.</p>

      <div class="auth-divider"></div>

      <!-- Error message (shown by JS) -->
      <div class="auth-error" id="signupError"></div>

      <!-- Form -->
      <form class="auth-form" id="signupForm" novalidate>

        <div class="auth-field">
          <label class="auth-label" for="signupName">Full name</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">👤</span>
            <input
              class="auth-input"
              type="text"
              id="signupName"
              name="name"
              placeholder="Your name"
              autocomplete="name"
              required
            >
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="signupEmail">Email address</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">✉️</span>
            <input
              class="auth-input"
              type="email"
              id="signupEmail"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="signupPassword">Password</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">🔒</span>
            <input
              class="auth-input"
              type="password"
              id="signupPassword"
              name="password"
              placeholder="Min. 6 characters"
              autocomplete="new-password"
              required
            >
            <button
              type="button"
              class="auth-toggle-pass"
              id="toggleSignupPass"
              aria-label="Toggle password visibility"
            >Show</button>
          </div>
        </div>

        <button type="submit" class="auth-submit" id="signupBtn">
          <span id="signupBtnText">Create Account →</span>
        </button>

      </form>

      <!-- Trust signals -->
      <div class="auth-trust">
        <div class="auth-trust-item">🔒 Encrypted</div>
        <div class="auth-trust-item">🌿 Free forever</div>
        <div class="auth-trust-item">📵 No spam</div>
      </div>

      <!-- Switch to login -->
      <div class="auth-switch">
        <!-- FIX: Was href="login.html" → use Flask route '/login' -->
        Already have an account? <a href="/login">Log in</a>
      </div>

    </div>
  </div>

</div>

<!-- JS — auth only, no chart or data deps needed -->
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/signup.js"></script>

</body>
</html>
